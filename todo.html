<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOアプリ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #4f8ef7; }

    .input-row button {
      padding: 10px 18px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #3a7de0; }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      padding: 5px 14px;
      border: 1.5px solid #ddd;
      border-radius: 20px;
      background: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      color: #555;
      transition: all 0.2s;
    }

    .filters button.active {
      background: #4f8ef7;
      border-color: #4f8ef7;
      color: #fff;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border: 1.5px solid #eee;
      border-radius: 8px;
      transition: opacity 0.2s;
    }

    li.done { opacity: 0.5; }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f8ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    li span {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      word-break: break-word;
    }

    li.done span { text-decoration: line-through; }

    li button.del {
      background: none;
      border: none;
      color: #bbb;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    li button.del:hover { color: #e74c3c; }

    .footer {
      margin-top: 20px;
      font-size: 0.82rem;
      color: #aaa;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer button {
      background: none;
      border: none;
      color: #aaa;
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: underline;
    }

    .footer button:hover { color: #e74c3c; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 24px 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>TODO</h1>
  <div class="input-row">
    <input type="text" id="newTask" placeholder="新しいタスクを入力..." />
    <button onclick="addTask()">追加</button>
  </div>
  <div class="filters">
    <button class="active" onclick="setFilter('all', this)">すべて</button>
    <button onclick="setFilter('active', this)">未完了</button>
    <button onclick="setFilter('done', this)">完了</button>
  </div>
  <ul id="list"></ul>
  <div id="empty" class="empty" style="display:none">タスクがありません</div>
  <div class="footer">
    <span id="count"></span>
    <button onclick="clearDone()">完了済みを削除</button>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let filter = 'all';

  function save() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function render() {
    const list = document.getElementById('list');
    const filtered = tasks.filter(t =>
      filter === 'all' ? true : filter === 'done' ? t.done : !t.done
    );

    list.innerHTML = filtered.map((t, i) => {
      const realIndex = tasks.indexOf(t);
      return `<li class="${t.done ? 'done' : ''}">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${realIndex})">
        <span>${escHtml(t.text)}</span>
        <button class="del" onclick="remove(${realIndex})" title="削除">&#x2715;</button>
      </li>`;
    }).join('');

    const empty = document.getElementById('empty');
    empty.style.display = filtered.length === 0 ? 'block' : 'none';

    const remaining = tasks.filter(t => !t.done).length;
    document.getElementById('count').textContent = `残り ${remaining} 件`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addTask() {
    const input = document.getElementById('newTask');
    const text = input.value.trim();
    if (!text) return;
    tasks.unshift({ text, done: false });
    input.value = '';
    save();
    render();
  }

  function toggle(i) {
    tasks[i].done = !tasks[i].done;
    save();
    render();
  }

  function remove(i) {
    tasks.splice(i, 1);
    save();
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save();
    render();
  }

  document.getElementById('newTask').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
